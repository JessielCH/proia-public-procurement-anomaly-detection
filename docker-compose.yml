version: "3.8"

services:
  # Base de Datos Vectorial (Persistente)
  db-vectorial:
    image: chromadb/chroma:latest
    volumes:
      - ./vector_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    ports:
      - "8001:8000"

  # API de Inteligencia Artificial
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - CHROMA_SERVER_HOST=db-vectorial
      - CHROMA_SERVER_PORT=8000
    depends_on:
      - db-vectorial

  # Interfaz de Usuario
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
